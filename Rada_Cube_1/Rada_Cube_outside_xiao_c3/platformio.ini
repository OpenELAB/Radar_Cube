; XIAO ESP32-C3 low-power BLE standby test project
;
; Build one environment at a time, for example:
;   platformio run -e xiao_3s_30ms
;
; All environments use the same firmware. Only the BLE scan interval/window
; macros change, which keeps power measurements repeatable.

[platformio]
default_envs = xiao_3s_30ms

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = seeed_xiao_esp32c3
framework = arduino, espidf
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.partitions = outside_4MB.csv
monitor_speed = 115200
lib_deps =
    RadarCommon=symlink://../common/RadarCommon
build_flags =
    -D CORE_DEBUG_LEVEL=2

[env:xiao_3s_30ms]
build_flags =
    ${env.build_flags}
    -D POWER_TEST_LOG_ENABLED=0
    -D STANDBY_SCAN_INTERVAL_MS=2000UL
    -D STANDBY_SCAN_WINDOW_MS=30UL

[env:xiao_3s_20ms]
build_flags =
    ${env.build_flags}
    -D POWER_TEST_LOG_ENABLED=0
    -D STANDBY_SCAN_INTERVAL_MS=3000UL
    -D STANDBY_SCAN_WINDOW_MS=20UL

[env:xiao_3s_10ms]
build_flags =
    ${env.build_flags}
    -D POWER_TEST_LOG_ENABLED=0
    -D STANDBY_SCAN_INTERVAL_MS=3000UL
    -D STANDBY_SCAN_WINDOW_MS=10UL

[env:xiao_5s_10ms]
build_flags =
    ${env.build_flags}
    -D POWER_TEST_LOG_ENABLED=0
    -D STANDBY_SCAN_INTERVAL_MS=5000UL
    -D STANDBY_SCAN_WINDOW_MS=10UL

; Use this build only while pairing or diagnosing. Serial/log output changes
; the measured current, so all four measurement environments above keep it off.
[env:xiao_3s_30ms_debug]
build_flags =
    ${env.build_flags}
    -D POWER_TEST_LOG_ENABLED=1
    -D STANDBY_SCAN_INTERVAL_MS=3000UL
    -D STANDBY_SCAN_WINDOW_MS=30UL

; Wake-path diagnostic build. It keeps automatic light sleep disabled and
; scans continuously so BLE payload/MAC validation and the BLE-to-ESP-NOW
; transition can be observed independently of low-power timing.
[env:xiao_wake_debug]
build_unflags =
    -D CORE_DEBUG_LEVEL=2
build_flags =
    ${env.build_flags}
    -UCORE_DEBUG_LEVEL
    -D CORE_DEBUG_LEVEL=3
    -D POWER_TEST_LOG_ENABLED=1
    -D WAKE_DEBUG_DISABLE_LIGHT_SLEEP=1
    -D STANDBY_SCAN_INTERVAL_MS=100UL
    -D STANDBY_SCAN_WINDOW_MS=100UL
